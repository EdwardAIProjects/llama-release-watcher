# Mirrors llama.cpp "Publish Docker image" for CUDA 12 and CUDA 13 on Linux.
# Upstream reference: https://github.com/ggerganov/llama.cpp/blob/master/.github/workflows/docker.yml
#
# Required secrets (configure in repository settings):
#   DOCKER_REGISTRY_USERNAME - registry username (for ghcr.io, use the GitHub org/user name)
#   DOCKER_REGISTRY_TOKEN    - registry password or PAT with write:packages
#
# Optional variables:
#   DOCKER_REGISTRY          - defaults to ghcr.io
#   DOCKER_IMAGE_REPO        - defaults to ghcr.io/<owner>/llama-cpp

name: Llama Release Watcher

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  UPSTREAM_REPO: ggerganov/llama.cpp
  REGISTRY: ${{ vars.DOCKER_REGISTRY != '' && vars.DOCKER_REGISTRY || 'ghcr.io' }}
  IMAGE_REPO: ${{ vars.DOCKER_IMAGE_REPO != '' && vars.DOCKER_IMAGE_REPO || format('ghcr.io/{0}/llama-cpp', github.repository_owner) }}

jobs:
  check:
    name: Check for new llama.cpp release
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.release_check.outputs.new_release }}
      release_tag: ${{ steps.release_check.outputs.release_tag }}
    steps:
      - name: Checkout watcher repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Check for new release
        id: release_check
        run: python scripts/check_release.py

  prepare_matrices:
    name: Prepare CUDA Docker matrices
    needs: check
    if: needs.check.outputs.new_release == 'true'
    runs-on: ubuntu-24.04
    outputs:
      build_matrix: ${{ steps.matrices.outputs.build_matrix }}
      merge_matrix: ${{ steps.matrices.outputs.merge_matrix }}
    steps:
      - name: Generate CUDA build and merge matrices
        id: matrices
        shell: bash
        run: |
          set -euo pipefail

          cat > build-matrix.json <<'JSON'
          [
            { "tag": "cuda cuda12", "dockerfile": ".devops/cuda.Dockerfile", "cuda_version": "12.8.1", "platforms": "linux/amd64", "full": true, "light": true, "server": true, "free_disk_space": true, "runs_on": "ubuntu-24.04" },
            { "tag": "cuda cuda12", "dockerfile": ".devops/cuda.Dockerfile", "cuda_version": "12.8.1", "platforms": "linux/arm64", "full": true, "light": true, "server": true, "free_disk_space": true, "runs_on": "ubuntu-24.04-arm" },
            { "tag": "cuda13", "dockerfile": ".devops/cuda.Dockerfile", "cuda_version": "13.3.0", "platforms": "linux/amd64", "full": true, "light": true, "server": true, "free_disk_space": true, "runs_on": "ubuntu-24.04" },
            { "tag": "cuda13", "dockerfile": ".devops/cuda.Dockerfile", "cuda_version": "13.3.0", "platforms": "linux/arm64", "full": true, "light": true, "server": true, "free_disk_space": true, "runs_on": "ubuntu-24.04-arm" }
          ]
          JSON

          BUILD_MATRIX="$(jq -c . build-matrix.json)"
          MERGE_MATRIX="$(jq -c '
            reduce .[] as $entry ({}; .[$entry.tag] |= (
              . // {
                tag: $entry.tag,
                arches: [],
                full: false,
                light: false,
                server: false
              }
              | .full = (.full or ($entry.full // false))
              | .light = (.light or ($entry.light // false))
              | .server = (.server or ($entry.server // false))
              | .arches += [($entry.platforms | sub("^linux/"; ""))]
            ))
            | [.[] | .arches = (.arches | unique | sort | join(" "))]
          ' build-matrix.json)"

          echo "build_matrix=$BUILD_MATRIX" >> "$GITHUB_OUTPUT"
          echo "merge_matrix=$MERGE_MATRIX" >> "$GITHUB_OUTPUT"

  push_to_registry:
    name: Build and push CUDA Docker images
    needs: [check, prepare_matrices]
    if: needs.check.outputs.new_release == 'true'
    runs-on: ${{ matrix.config.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.prepare_matrices.outputs.build_matrix) }}
    steps:
      - name: Check out llama.cpp at release tag
        id: checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.check.outputs.release_tag }}
          fetch-depth: 0
          path: llama.cpp

      - name: Set up QEMU
        if: ${{ contains(matrix.config.platforms, 'linux/arm64') && matrix.config.runs_on == 'ubuntu-24.04' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Determine image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_REPO="$(echo "${{ env.IMAGE_REPO }}" | tr '[:upper:]' '[:lower:]')"
          PREFIX="${IMAGE_REPO}:"
          PLATFORM="${{ matrix.config.platforms }}"
          ARCH_SUFFIX="${PLATFORM#linux/}"
          TAGS="${{ matrix.config.tag }}"

          for tag in $TAGS; do
            if [[ "$tag" == "cpu" ]]; then
              TYPE=""
            else
              TYPE="-${tag}"
            fi
            CACHETAG="${PREFIX}buildcache${TYPE}-${ARCH_SUFFIX}"
          done

          SAFE_TAGS="$(echo "$TAGS" | tr ' ' '_')"

          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "arch_suffix=$ARCH_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "cache_output_tag=$CACHETAG" >> "$GITHUB_OUTPUT"
          echo "digest_artifact_suffix=${SAFE_TAGS}-${ARCH_SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "cache_output_tag=$CACHETAG"

      - name: Get build date
        id: build_date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Free Disk Space (Ubuntu)
        if: ${{ matrix.config.free_disk_space == true }}
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build and push Full Docker image by digest
        id: build_full
        if: ${{ matrix.config.full == true }}
        uses: docker/build-push-action@v6
        with:
          context: llama.cpp
          platforms: ${{ matrix.config.platforms }}
          outputs: type=image,name=${{ steps.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          file: llama.cpp/${{ matrix.config.dockerfile }}
          target: full
          provenance: false
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            APP_VERSION=${{ needs.check.outputs.release_tag }}
            APP_REVISION=${{ steps.checkout.outputs.commit }}
            IMAGE_URL=https://github.com/${{ env.UPSTREAM_REPO }}
            IMAGE_SOURCE=https://github.com/${{ env.UPSTREAM_REPO }}
            ${{ matrix.config.ubuntu_version && format('UBUNTU_VERSION={0}', matrix.config.ubuntu_version) || '' }}
            ${{ matrix.config.cuda_version && format('CUDA_VERSION={0}', matrix.config.cuda_version) || '' }}
          annotations: |
            manifest:org.opencontainers.image.created=${{ steps.build_date.outputs.date }}
            manifest:org.opencontainers.image.version=${{ needs.check.outputs.release_tag }}
            manifest:org.opencontainers.image.revision=${{ steps.checkout.outputs.commit }}
            manifest:org.opencontainers.image.title=llama.cpp
            manifest:org.opencontainers.image.description=LLM inference in C/C++
            manifest:org.opencontainers.image.url=https://github.com/${{ env.UPSTREAM_REPO }}
            manifest:org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_output_tag }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_output_tag }},mode=max

      - name: Build and push Light Docker image by digest
        id: build_light
        if: ${{ matrix.config.light == true }}
        uses: docker/build-push-action@v6
        with:
          context: llama.cpp
          platforms: ${{ matrix.config.platforms }}
          outputs: type=image,name=${{ steps.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          file: llama.cpp/${{ matrix.config.dockerfile }}
          target: light
          provenance: false
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            APP_VERSION=${{ needs.check.outputs.release_tag }}
            APP_REVISION=${{ steps.checkout.outputs.commit }}
            IMAGE_URL=https://github.com/${{ env.UPSTREAM_REPO }}
            IMAGE_SOURCE=https://github.com/${{ env.UPSTREAM_REPO }}
            ${{ matrix.config.ubuntu_version && format('UBUNTU_VERSION={0}', matrix.config.ubuntu_version) || '' }}
            ${{ matrix.config.cuda_version && format('CUDA_VERSION={0}', matrix.config.cuda_version) || '' }}
          annotations: |
            manifest:org.opencontainers.image.created=${{ steps.build_date.outputs.date }}
            manifest:org.opencontainers.image.version=${{ needs.check.outputs.release_tag }}
            manifest:org.opencontainers.image.revision=${{ steps.checkout.outputs.commit }}
            manifest:org.opencontainers.image.title=llama.cpp
            manifest:org.opencontainers.image.description=LLM inference in C/C++
            manifest:org.opencontainers.image.url=https://github.com/${{ env.UPSTREAM_REPO }}
            manifest:org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_output_tag }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_output_tag }},mode=max

      - name: Build and push Server Docker image by digest
        id: build_server
        if: ${{ matrix.config.server == true }}
        uses: docker/build-push-action@v6
        with:
          context: llama.cpp
          platforms: ${{ matrix.config.platforms }}
          outputs: type=image,name=${{ steps.meta.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
          file: llama.cpp/${{ matrix.config.dockerfile }}
          target: server
          provenance: false
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            APP_VERSION=${{ needs.check.outputs.release_tag }}
            APP_REVISION=${{ steps.checkout.outputs.commit }}
            IMAGE_URL=https://github.com/${{ env.UPSTREAM_REPO }}
            IMAGE_SOURCE=https://github.com/${{ env.UPSTREAM_REPO }}
            ${{ matrix.config.ubuntu_version && format('UBUNTU_VERSION={0}', matrix.config.ubuntu_version) || '' }}
            ${{ matrix.config.cuda_version && format('CUDA_VERSION={0}', matrix.config.cuda_version) || '' }}
          annotations: |
            manifest:org.opencontainers.image.created=${{ steps.build_date.outputs.date }}
            manifest:org.opencontainers.image.version=${{ needs.check.outputs.release_tag }}
            manifest:org.opencontainers.image.revision=${{ steps.checkout.outputs.commit }}
            manifest:org.opencontainers.image.title=llama.cpp
            manifest:org.opencontainers.image.description=LLM inference in C/C++
            manifest:org.opencontainers.image.url=https://github.com/${{ env.UPSTREAM_REPO }}
            manifest:org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_output_tag }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_output_tag }},mode=max

      - name: Export digest metadata
        shell: bash
        run: |
          set -euo pipefail

          TAGS="${{ matrix.config.tag }}"
          ARCH_SUFFIX="${{ steps.meta.outputs.arch_suffix }}"
          DIGEST_FILE="/tmp/digests/${{ steps.meta.outputs.digest_artifact_suffix }}.tsv"
          mkdir -p /tmp/digests

          add_digest_rows() {
            local image_type="$1"
            local digest="$2"

            if [[ -z "$digest" ]]; then
              echo "Missing digest for image_type=${image_type}" >&2
              exit 1
            fi

            for tag in $TAGS; do
              printf '%s\t%s\t%s\t%s\n' "$tag" "$ARCH_SUFFIX" "$image_type" "$digest" >> "$DIGEST_FILE"
            done
          }

          if [[ "${{ matrix.config.full }}" == "true" ]]; then
            add_digest_rows "full" "${{ steps.build_full.outputs.digest }}"
          fi

          if [[ "${{ matrix.config.light }}" == "true" ]]; then
            add_digest_rows "light" "${{ steps.build_light.outputs.digest }}"
          fi

          if [[ "${{ matrix.config.server }}" == "true" ]]; then
            add_digest_rows "server" "${{ steps.build_server.outputs.digest }}"
          fi

      - name: Upload digest metadata
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.meta.outputs.digest_artifact_suffix }}
          path: /tmp/digests/${{ steps.meta.outputs.digest_artifact_suffix }}.tsv
          if-no-files-found: error

  merge_arch_tags:
    name: Create shared CUDA tags from digests
    needs: [check, prepare_matrices, push_to_registry]
    if: needs.check.outputs.new_release == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.prepare_matrices.outputs.merge_matrix) }}
    steps:
      - name: Check out llama.cpp at release tag
        id: checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ needs.check.outputs.release_tag }}
          fetch-depth: 1
          path: llama.cpp

      - name: Get build date
        id: build_date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Download digest metadata
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Create tags from digests
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_REPO="$(echo "${{ env.IMAGE_REPO }}" | tr '[:upper:]' '[:lower:]')"
          PREFIX="${IMAGE_REPO}:"
          SRC_TAG="${{ needs.check.outputs.release_tag }}"
          BUILD_DATE="${{ steps.build_date.outputs.date }}"
          COMMIT_SHA="${{ steps.checkout.outputs.commit }}"
          TAGS="${{ matrix.config.tag }}"
          ARCHES="${{ matrix.config.arches }}"
          DIGEST_GLOB="/tmp/digests/*.tsv"

          if [[ -z "$SRC_TAG" ]]; then
            echo "Missing release tag from check job" >&2
            exit 1
          fi

          if ! ls ${DIGEST_GLOB} >/dev/null 2>&1; then
            echo "No digest metadata found in /tmp/digests" >&2
            exit 1
          fi

          find_digest() {
            local tag_name="$1"
            local arch="$2"
            local image_type="$3"
            local digest

            digest="$(awk -F '\t' -v t="$tag_name" -v a="$arch" -v i="$image_type" '$1 == t && $2 == a && $3 == i { print $4; exit }' ${DIGEST_GLOB})"

            if [[ -z "$digest" ]]; then
              echo "Missing digest for tag=${tag_name} arch=${arch} image_type=${image_type}" >&2
              exit 1
            fi

            echo "$digest"
          }

          create_manifest_tags() {
            local image_type="$1"
            local tag_name="$2"
            local suffix="$3"

            local merged_tag="${PREFIX}${image_type}${suffix}"
            local merged_versioned_tag="${merged_tag}-${SRC_TAG}"
            local refs=()

            for arch in $ARCHES; do
              local digest
              digest="$(find_digest "$tag_name" "$arch" "$image_type")"
              refs+=("${IMAGE_REPO}@${digest}")
            done

            local annotations=(
              --annotation "index:org.opencontainers.image.created=${BUILD_DATE}"
              --annotation "index:org.opencontainers.image.version=${SRC_TAG}"
              --annotation "index:org.opencontainers.image.revision=${COMMIT_SHA}"
              --annotation "index:org.opencontainers.image.title=llama.cpp"
              --annotation "index:org.opencontainers.image.description=LLM inference in C/C++"
              --annotation "index:org.opencontainers.image.url=https://github.com/${{ env.UPSTREAM_REPO }}"
              --annotation "index:org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}"
            )

            echo "Creating ${merged_tag} from ${refs[*]}"
            docker buildx imagetools create "${annotations[@]}" --tag "${merged_tag}" "${refs[@]}"

            echo "Creating ${merged_versioned_tag} from ${refs[*]}"
            docker buildx imagetools create "${annotations[@]}" --tag "${merged_versioned_tag}" "${refs[@]}"
          }

          for tag in $TAGS; do
            if [[ "$tag" == "cpu" ]]; then
              TYPE=""
            else
              TYPE="-${tag}"
            fi

            if [[ "${{ matrix.config.full }}" == "true" ]]; then
              create_manifest_tags "full" "$tag" "$TYPE"
            fi

            if [[ "${{ matrix.config.light }}" == "true" ]]; then
              create_manifest_tags "light" "$tag" "$TYPE"
            fi

            if [[ "${{ matrix.config.server }}" == "true" ]]; then
              create_manifest_tags "server" "$tag" "$TYPE"
            fi
          done

  commit_version:
    name: Commit last seen release version
    needs: [check, merge_arch_tags]
    if: needs.check.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout watcher repository
        uses: actions/checkout@v4

      - name: Commit and push new version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          printf '%s\n' "${{ needs.check.outputs.release_tag }}" > last_release_version.txt
          git add last_release_version.txt
          git diff --cached --quiet && echo "No version file changes to commit." && exit 0
          git commit -s -m "chore: update last seen release version to ${{ needs.check.outputs.release_tag }}"
          git push
